name: 'Resolve affected apps'
description: >
  On push: queries the GitHub Deployments API per app to find the last
  successful deployment SHA, then runs nx affected to build a deploy matrix. On
  workflow_dispatch: resolves the explicit app list instead.
author: Rogier van Straten <rogier@from89.com>
branding:
  icon: git-branch
  color: purple

inputs:
  github-token:
    description:
      'GitHub token with deployments:read and contents:read permissions'
    required: true
  event-name:
    description: 'github.event_name'
    required: true
  ref-name:
    description: 'github.ref_name'
    required: true
  environment:
    description:
      'Explicit environment for workflow_dispatch (staging | production)'
    required: false
    default: ''
  apps:
    description: 'Comma-separated app short names for workflow_dispatch'
    required: false
    default: ''
  exclude:
    description:
      'Comma-separated project names to exclude from affected resolution'
    required: false
    default: ''

outputs:
  matrix:
    description: 'JSON array of {app, environment, base_sha} objects'
  has-apps:
    description: 'true if any apps are in the matrix'
  environment:
    description: 'Resolved environment name (staging | production)'

runs:
  using: node24
  main: dist/index.js
